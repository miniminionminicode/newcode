name: Data Sync

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  execute_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Script
        env:
          URL_BASE: ${{ secrets.URL_BASE }}
          DATA_URL: ${{ secrets.DATA_URL }}
          SECURE_PATH: ${{ secrets.SECURE_PATH }}
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
          AUTH_VAL: ${{ secrets.AUTH_VAL }}
          THREADS: 5
        run: python script.py

      - name: Deploy to Storage Repo
        env:
          TOKEN: ${{ secrets.MY_PAT }}
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/${{ github.repository_owner }}/k.git k_repo
          mv newfile.json k_repo/
          cd k_repo
          git config user.name "Sync-Bot"
          git config user.email "bot@sync.com"
          git add newfile.json
          git commit -m "Auto-Sync: $(date -u)" || exit 0
          git push origin main
